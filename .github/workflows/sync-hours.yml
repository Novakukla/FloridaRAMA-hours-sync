name: Sync Hours Data

on:
  workflow_dispatch:
  schedule:
    # End-of-day style sync (04:15 UTC daily)
    - cron: "15 4 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate static data
        env:
          PRIVATE_ICS_URL: ${{ secrets.PRIVATE_ICS_URL }}
        run: node scripts/sync-hours-data.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/hours.json data/special-hours.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: sync calendar hours data"
          git push
